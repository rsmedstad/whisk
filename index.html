<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#16a34a" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#15803d" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Whisk</title>
  </head>
  <body class="bg-white dark:bg-stone-950 text-stone-900 dark:text-stone-100">
    <div id="root"></div>
    <script>
      // Synchronous theme application — prevents flash of wrong theme before React mounts
      (function() {
        var t = localStorage.getItem('whisk_theme') || 'seasonal';
        var dark = t === 'dark' || ((t === 'system' || t === 'seasonal') && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.classList.toggle('dark', dark);
      })();

      // One-time migration: nuke old service workers and caches.
      // Old SWs (whisk-v5 etc.) cache JS/CSS and block updates forever.
      // Gated by version flag so it runs once per client.
      (function() {
        if (!('serviceWorker' in navigator) || localStorage.getItem('whisk_sw_v') === '2') return;
        localStorage.setItem('whisk_sw_v', '2');
        var p1 = navigator.serviceWorker.getRegistrations().then(function(regs) {
          return Promise.all(regs.map(function(r) { return r.unregister(); }));
        });
        var p2 = ('caches' in window) ? caches.keys().then(function(keys) {
          return Promise.all(keys.map(function(k) { return caches.delete(k); }));
        }) : Promise.resolve();
        Promise.all([p1, p2]).then(function() { window.location.reload(); });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
