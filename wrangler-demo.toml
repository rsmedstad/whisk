name = "whisk-demo"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"

# Demo KV namespace (isolated from personal instance)
[[kv_namespaces]]
binding = "WHISK_KV"
id = "212ca20cb74b475da57767af91a23564"

# Demo R2 bucket (isolated from personal instance)
[[r2_buckets]]
binding = "WHISK_R2"
